name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest coverage
          pip install -r client/requirements.txt

      - name: Run tests with coverage
        run: |
          python -m coverage run --branch -m pytest tests/ -v

      - name: Check coverage (line >= 50%, branch >= 50%)
        run: |
          python -m coverage report --include="server/*,client/*" -m
          python -m coverage json --include="server/*,client/*" -o /tmp/coverage.json
          python -c "
          import json, sys
          with open('/tmp/coverage.json') as f:
              data = json.load(f)
          totals = data['totals']
          line = (totals['covered_lines'] / totals['num_statements'] * 100) if totals['num_statements'] else 100.0
          branch = (totals['covered_branches'] / totals['num_branches'] * 100) if totals['num_branches'] else 100.0
          print(f'Line coverage: {line:.1f}%')
          print(f'Branch coverage: {branch:.1f}%')
          fail = False
          if line < 50:
              print(f'FAIL: Line coverage {line:.1f}% < 50%')
              fail = True
          if branch < 50:
              print(f'FAIL: Branch coverage {branch:.1f}% < 50%')
              fail = True
          if fail:
              sys.exit(1)
          print(f'PASS: Line coverage {line:.1f}%, Branch coverage {branch:.1f}%')
          "

  build-linux:
    name: Build Linux Executable
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Linux executable
        working-directory: ./server
        run: |
          python -m PyInstaller \
            --name inspection-agent \
            --onedir \
            --console \
            agent.py
          DIST_DIR="dist/inspection-agent"
          cat > "$DIST_DIR/start.sh" << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$SCRIPT_DIR"
          ./inspection-agent "$@"
          EOF
          chmod +x "$DIST_DIR/start.sh"
          cat > "$DIST_DIR/inspection-agent.service" << 'EOF'
          [Unit]
          Description=Inspection Agent
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=/opt/inspection-agent
          ExecStart=/opt/inspection-agent/inspection-agent --port 5000
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF
          mkdir -p dist/inspection-agent-linux
          mv dist/inspection-agent/* dist/inspection-agent-linux/
          cd dist && tar czvf inspection-agent-linux.tar.gz inspection-agent-linux/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: server/dist/inspection-agent-linux.tar.gz

  build-windows:
    name: Build Windows Executable
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Windows executable
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/build_windows.py
          $dist = "server/dist/inspection-agent"
          $winDist = "server/dist/inspection-agent-windows"
          New-Item -ItemType Directory -Force -Path $winDist
          Copy-Item -Path "$dist/*" -Destination $winDist -Recurse -Force
          Compress-Archive -Path "$winDist/*" -DestinationPath "server/dist/inspection-agent-windows.zip" -Force
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: server/dist/inspection-agent-windows.zip

  build-client-windows:
    name: Build Windows Client Executable
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r client/requirements.txt

      - name: Build Windows client executable
        working-directory: ./client
        run: |
          python -m PyInstaller `
            --name inspection-client `
            --onedir `
            --console `
            main.py
          $dist = "dist/inspection-client"
          Copy-Item -Path "config.json" -Destination "$dist/config.json" -Force
          @"
          @echo off
          cd /d "%~dp0"
          inspection-client.exe
          pause
          "@ | Out-File -Encoding utf8 "$dist/start.bat"
          @"
          @echo off
          cd /d "%~dp0"
          inspection-client.exe --output report.json
          pause
          "@ | Out-File -Encoding utf8 "$dist/start_json.bat"
          @"
          @echo off
          cd /d "%~dp0"
          inspection-client.exe --output report.txt
          pause
          "@ | Out-File -Encoding utf8 "$dist/start_txt.bat"
          $winDist = "dist/inspection-client-windows"
          New-Item -ItemType Directory -Force -Path $winDist
          Copy-Item -Path "$dist/*" -Destination $winDist -Recurse -Force
          Compress-Archive -Path "$winDist/*" -DestinationPath "dist/inspection-client-windows.zip" -Force
        shell: pwsh

      - name: Upload Windows client artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-client-build
          path: client/dist/inspection-client-windows.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-client-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts

      - name: Download Windows client artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-client-build
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
