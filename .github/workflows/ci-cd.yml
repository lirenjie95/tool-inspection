name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 client/ server/ scripts/ tests/ \
            --max-line-length=250 \
            --extend-ignore=E402 \


  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest coverage
          pip install -r client/requirements.txt

      - name: Run tests with coverage
        run: |
          python -m coverage run --branch -m pytest tests/ -v

      - name: Check coverage (line >= 50%, branch >= 50%)
        run: |
          python -m coverage report --include="server/*,client/*" -m
          python -m coverage json --include="server/*,client/*" -o /tmp/coverage.json
          python -c "
          import json, sys
          with open('/tmp/coverage.json') as f:
              data = json.load(f)
          totals = data['totals']
          line = (totals['covered_lines'] / totals['num_statements'] * 100) if totals['num_statements'] else 100.0
          branch = (totals['covered_branches'] / totals['num_branches'] * 100) if totals['num_branches'] else 100.0
          print(f'Line coverage: {line:.1f}%')
          print(f'Branch coverage: {branch:.1f}%')
          fail = False
          if line < 50:
              print(f'FAIL: Line coverage {line:.1f}% < 50%')
              fail = True
          if branch < 50:
              print(f'FAIL: Branch coverage {branch:.1f}% < 50%')
              fail = True
          if fail:
              sys.exit(1)
          print(f'PASS: Line coverage {line:.1f}%, Branch coverage {branch:.1f}%')
          "

  build-linux:
    name: Build Linux Executable
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Linux executable
        run: |
          # Build with the project script so the output layout stays consistent
          # with local builds: dist/inspection-agent/ with ELF, start.sh, and
          # scripts/inspection-agent.service.
          bash scripts/build_linux.sh
          mkdir -p server/dist/inspection-agent-linux
          mv server/dist/inspection-agent/* server/dist/inspection-agent-linux/
          cd server/dist && tar czvf inspection-agent-linux.tar.gz inspection-agent-linux/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-build
          path: server/dist/inspection-agent-linux.tar.gz

  build-windows:
    name: Build Windows Executable
    needs: [lint, test]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Cache Python 3.7 legacy runtime
        uses: actions/cache@v5
        with:
          path: .py37-legacy-cache
          key: ${{ runner.os }}-py37-legacy-${{ hashFiles('scripts/build_windows.py') }}
          restore-keys: |
            ${{ runner.os }}-py37-legacy-

      - name: Build Windows executable
        env:
          PYTHONIOENCODING: utf-8
        run: |
          # Use --no-patch-required mode so the generated exe can run directly on
          # Windows Server 2008 R2 / Win7 without KB3063858/KB2533623 patches.
          python scripts/build_windows.py --no-patch-required
          $dist = "server/dist/inspection-agent"
          $winDist = "server/dist/inspection-agent-windows"
          New-Item -ItemType Directory -Force -Path $winDist
          Copy-Item -Path "$dist/*" -Destination $winDist -Recurse -Force
          Compress-Archive -Path "$winDist/*" -DestinationPath "server/dist/inspection-agent-windows.zip" -Force
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-build
          path: server/dist/inspection-agent-windows.zip

  build-client-windows:
    name: Build Windows Client Executable
    needs: [lint, test]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Cache Python 3.7 legacy runtime
        uses: actions/cache@v4
        with:
          path: .py37-legacy-cache
          key: ${{ runner.os }}-py37-legacy-${{ hashFiles('scripts/build_windows.py', 'scripts/build_client_windows.py', 'scripts/_build_common.py') }}
          restore-keys: |
            ${{ runner.os }}-py37-legacy-

      - name: Build Windows client executable
        env:
          PYTHONIOENCODING: utf-8
        run: |
          # 使用 --no-patch-required 模式，确保生成的客户端 exe 在未安装 KB3063858/KB2533623 补丁的
          # Windows Server 2008 R2 / Win7 上也能直接运行
          python scripts/build_client_windows.py --no-patch-required
          $dist = "client/dist/inspection-client"
          $winDist = "client/dist/inspection-client-windows"
          New-Item -ItemType Directory -Force -Path $winDist
          Copy-Item -Path "$dist/*" -Destination $winDist -Recurse -Force
          Compress-Archive -Path "$winDist/*" -DestinationPath "client/dist/inspection-client-windows.zip" -Force
        shell: pwsh

      - name: Upload Windows client artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-client-build
          path: client/dist/inspection-client-windows.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-client-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download Linux artifact
        uses: actions/download-artifact@v7
        with:
          name: linux-build
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v7
        with:
          name: windows-build
          path: ./artifacts

      - name: Download Windows client artifact
        uses: actions/download-artifact@v7
        with:
          name: windows-client-build
          path: ./artifacts

      - name: Set up Python for release notes
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install release notes dependencies
        run: pip install deep-translator

      - name: Generate bilingual release notes
        run: python3 scripts/generate_release_notes.py > release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/*
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
